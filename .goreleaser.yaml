version: 2

project_name: boa

before:
  hooks:
    - bash -c "cd dashboard/web && npm ci && npm run build"

builds:
  - id: boa
    dir: dashboard
    main: .
    binary: boa
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Windows builds deferred for v1 due to upstream pokegents portability:
    #   - dashboard/server/state.go:1866 uses syscall.Kill (non-Windows)
    #   - Process management primitives differ on Windows
    # When/if those are abstracted, add `windows` to goos and exclude
    # windows/arm64 via the ignore: block as before.
    ldflags:
      - -s -w

archives:
  - id: boa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - DISCLAIMER.md
      - THIRD_PARTY_NOTICES.md
      - README.md
      - install.sh
      - dashboard/web/dist

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
