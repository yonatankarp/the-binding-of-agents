version: 2

project_name: boa

before:
  hooks:
    - bash -c "cd dashboard/web && npm ci && npm run build"

builds:
  - id: boa
    dir: dashboard
    main: .
    binary: boa
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # Linux + Windows builds are deferred for v0.1 due to upstream pokegents
    # portability bugs:
    #   - dashboard/server/setup.go:713 uses shellQuote() which is darwin-only
    #     (defined in terminal_darwin.go with //go:build darwin)
    #   - dashboard/server/state.go:1866 uses syscall.Kill (non-Windows)
    # When these are fixed, add `linux` and `windows` to goos and re-test the
    # snapshot build before tagging.
    ldflags:
      - -s -w

archives:
  - id: boa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - DISCLAIMER.md
      - THIRD_PARTY_NOTICES.md
      - README.md
      - dashboard/web/dist

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
