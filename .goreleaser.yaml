version: 2

project_name: boa

before:
  hooks:
    - bash -c "cd dashboard/web && npm ci && npm run build"

builds:
  - id: boa
    dir: dashboard
    main: .
    binary: boa
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - id: boa
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - NOTICE
      - DISCLAIMER.md
      - THIRD_PARTY_NOTICES.md
      - README.md
      - dashboard/web/dist/**/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
